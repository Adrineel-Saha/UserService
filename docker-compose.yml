services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: user-service
    container_name: user-service
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFERIPADDRESS=true
      - "SPRING_DATASOURCE_URL=jdbc:mysql://user-mysql:3306/UserServiceDatabase?allowPublicKeyRetrieval=true&useSSL=false"
    depends_on:
      user-mysql:
        condition: service_healthy
    networks:
      - microservices-net

  user-mysql:
    image: mysql:8.0
    container_name: user-mysql
    # Not published to the host (your local MySQL already owns host 3306).
    # Reachable by other containers at user-mysql:3306 on the shared network.
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=UserServiceDatabase
    volumes:
      - user-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

volumes:
  user-mysql-data:

networks:
  microservices-net:
    external: true
