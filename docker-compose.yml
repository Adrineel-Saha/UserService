services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: user-service
    container_name: user-service
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFERIPADDRESS=true
      - "SPRING_DATASOURCE_URL=jdbc:mysql://user-mysql:3306/UserServiceDatabase?allowPublicKeyRetrieval=true&useSSL=false"
      # Config repo sets spring.kafka.producer.bootstrap-servers=localhost:9092.
      # Override the producer sub-key (for sending) and the global key (used by
      # KafkaAdmin to create the NewTopic bean) to reach the broker container.
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_PRODUCER_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      user-mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - microservices-net

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    # Not published to the host (your local Kafka already owns host 9092).
    # Reachable by other containers at kafka:9092 on the shared network.
    # NOTE: container_name is fixed to "kafka", so do NOT bring this compose up
    # at the same time as the OrderService/ProductService composes (which also
    # define a "kafka" container) — the names would collide. Run per-service.
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - microservices-net

  user-mysql:
    image: mysql:8.0
    container_name: user-mysql
    # Not published to the host (your local MySQL already owns host 3306).
    # Reachable by other containers at user-mysql:3306 on the shared network.
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=UserServiceDatabase
    volumes:
      - user-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

volumes:
  user-mysql-data:
  kafka-data:

networks:
  microservices-net:
    external: true
