services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: user-service
    container_name: user-service
    # Retry startup until ConfigServer is registered/reachable (handles the
    # race when everything is started together with one `docker compose up`).
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFERIPADDRESS=true
      - "SPRING_DATASOURCE_URL=jdbc:mysql://user-mysql:3306/UserServiceDatabase?allowPublicKeyRetrieval=true&useSSL=false"
      # Config repo sets spring.kafka.producer.bootstrap-servers=localhost:9092.
      # Override to reach the shared broker (see Kafka/docker-compose.yml, which
      # must be up first). kafka:9092 resolves over microservices-net.
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_PRODUCER_BOOTSTRAP_SERVERS=kafka:9092
      # Override the C:/Microservices/logs path (used by Jenkins/local) with a
      # container path; the volume below maps it back to the same host folder.
      - LOGGING_FILE_NAME=/app/logs/UserService/UserService-8080.log
    volumes:
      - C:/Microservices/logs:/app/logs
    depends_on:
      user-mysql:
        condition: service_healthy
    networks:
      - microservices-net

  user-mysql:
    image: mysql:8.0
    container_name: user-mysql
    # Not published to the host (your local MySQL already owns host 3306).
    # Reachable by other containers at user-mysql:3306 on the shared network.
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=UserServiceDatabase
    volumes:
      - user-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

volumes:
  user-mysql-data:

networks:
  microservices-net:
    external: true
